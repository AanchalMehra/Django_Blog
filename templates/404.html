<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .error-card {
            max-width: 600px;
            width: 100%;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            animation: fadeIn 0.6s ease-in-out;
        }

        .error-code {
            font-size: 7rem;
            font-weight: 700;
            color: #dc3545;
            line-height: 1;
        }

        .error-icon {
            font-size: 5rem;
            color: #ffc107;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-home {
            padding: 10px 30px;
            border-radius: 50px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card error-card text-center p-5 mx-auto">
        <div class="card-body">

            <i class="bi bi-exclamation-triangle-fill error-icon mb-3"></i>

            <h1 class="error-code">404</h1>

            <h2 class="fw-bold mt-3">Page Not Found</h2>

            <p class="text-muted mt-3 mb-4">
                Oops! The page you're looking for doesn't exist or may have been moved.
                Please check the URL or return to the homepage.
            </p>

            <div class="d-flex justify-content-center gap-3 flex-wrap">
                <a href="/" class="btn btn-primary btn-home">
                    <i class="bi bi-house-door-fill"></i>
                    Home
                </a>

                <button onclick="history.back()" class="btn btn-outline-secondary btn-home">
                    <i class="bi bi-arrow-left"></i>
                    Go Back
                </button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
